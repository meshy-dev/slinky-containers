---
# Builds and pushes ghcr.io/meshy-dev/slinky-containers/slurmd:*cuda13.2*
# for both EFA and IB fabric variants via matrix strategy.
name: build-slurmd-cuda

on:
  push:
    branches:
      - main
    paths:
      - schedmd/slurm/**
      - .github/workflows/build-slurmd-cuda.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - fabric: efa
            target: "slurmd-cuda-efa login"
          - fabric: ib
            target: "slurmd-cuda-ib login-cuda-ib"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bake and push ${{ matrix.fabric }}
        env:
          BAKE_IMPORTS: schedmd/slurm/25.11/ubuntu24.04/slurm.hcl
          SHA: ${{ github.sha }}
        working-directory: schedmd/slurm
        run: |
          docker buildx bake \
            -f docker-bake.hcl \
            -f 25.11/ubuntu24.04/slurm.hcl \
            ${{ matrix.target }} \
            --push
