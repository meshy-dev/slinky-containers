---
# Builds and pushes ghcr.io/meshy-dev/slinky-containers/slurmd:*cuda13.2*efa
# via the `slurmd-cuda-efa` bake target (schedmd/slurm/docker-bake.hcl).
#
# Plan A5 / outline §10: the workflow is fork-local and independent of the
# legacy taichi-dev/deployments build-slurmd-nccl.yaml workflow. Not a reuse.
name: build-slurmd-cuda-efa

on:
  push:
    branches:
      - main
      - feat/forles-slurmd-efa-cuda13
    paths:
      - schedmd/slurm/**
      - .github/workflows/build-slurmd-cuda-efa.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bake and push slurmd-cuda-efa
        # BAKE_IMPORTS pulls in the per-version/flavor overrides (slurm_version,
        # linux_flavor) defined in 25.11/ubuntu24.04/slurm.hcl on top of the
        # root docker-bake.hcl.
        env:
          BAKE_IMPORTS: schedmd/slurm/25.11/ubuntu24.04/slurm.hcl
          SHA: ${{ github.sha }}
        working-directory: schedmd/slurm
        run: |
          docker buildx bake \
            -f docker-bake.hcl \
            -f 25.11/ubuntu24.04/slurm.hcl \
            slurmd-cuda-efa \
            --push
